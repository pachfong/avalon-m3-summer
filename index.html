<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-AVALON: STRICT MISSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #050505; color: #00ff41; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .cyber-border { border: 1px solid #00ff41; box-shadow: 0 0 8px #00ff41; }
        .btn-neon { border: 1px solid #00ff41; color: #00ff41; transition: 0.3s; cursor: pointer; background: rgba(0,0,0,0.5); }
        .btn-neon:hover:not(:disabled) { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        .btn-neon:disabled { border-color: #333; color: #333; cursor: not-allowed; opacity: 0.3; }
        .score-box { width: 40px; height: 40px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .score-good { background: #1e40af; border-color: #3b82f6; color: white; }
        .score-evil { background: #7f1d1d; border-color: #ef4444; color: white; }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 cyber-border p-4 bg-black rounded">
            <div>
                <h1 class="cyber-font text-lg font-bold text-neon uppercase">Avalon: Protocol 4</h1>
                <p id="game-status" class="text-[10px] text-yellow-500 uppercase">SYSTEM ACTIVE</p>
            </div>
            <div class="flex gap-2" id="scoreboard">
                <div class="score-box" id="m1">-</div>
                <div class="score-box" id="m2">-</div>
                <div class="score-box" id="m3">-</div>
                <div class="score-box" id="m4">-</div>
                <div class="score-box" id="m5">-</div>
            </div>
        </div>

        <div id="login-screen" class="cyber-border p-8 rounded bg-zinc-900 text-center">
            <input type="text" id="username" placeholder="รหัสชื่อของคุณ" class="w-full bg-black border border-zinc-700 p-4 mb-4 text-green-500 text-center outline-none">
            <button onclick="joinGame()" class="w-full btn-neon py-4 cyber-font font-bold">ACCESS SYSTEM</button>
            <button onclick="beHost()" class="text-zinc-600 text-[10px] mt-6 block mx-auto underline">HOST OVERRIDE</button>
        </div>

        <div id="game-board" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                <div class="p-3 bg-zinc-900 border-l-2 border-blue-500">
                    <span class="text-[9px] text-zinc-500 block">IDENTITY</span>
                    <span id="role-text" class="font-bold text-xs uppercase">ANALYZING...</span>
                </div>
                <div class="p-3 bg-zinc-900 border-l-2 border-green-500 col-span-2">
                    <span class="text-[9px] text-zinc-500 block">VOTING / MISSION PROGRESS</span>
                    <span id="progress-stats" class="font-bold text-xs">Waiting for action...</span>
                </div>
            </div>

            <div id="player-grid" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-6 text-center"></div>

            <div id="action-center" class="cyber-border p-6 bg-black rounded-lg min-h-[220px] flex flex-col justify-center">
                <div id="action-ui" class="space-y-4 text-center"></div>
            </div>

            <div id="host-panel" class="hidden mt-6 p-4 border border-yellow-600/30 bg-yellow-950/10 rounded">
                <h3 class="text-yellow-500 text-[10px] cyber-font mb-4 underline">ADMIN INTELLIGENCE</h3>
                <div id="admin-spy-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4"></div>
                <div class="flex gap-2">
                    <button onclick="distributeRoles()" id="start-btn" class="btn-neon text-[10px] px-4 py-2" disabled>START GAME</button>
                    <button onclick="resetGame()" class="btn-neon text-[10px] px-4 py-2 border-red-500 text-red-500 font-bold">RESET SYSTEM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbQMmh1szC4ANGJZihJazUzvtVjYHE44c",
            authDomain: "activitiesm3-2026.firebaseapp.com",
            databaseURL: "https://activitiesm3-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "activitiesm3-2026",
            storageBucket: "activitiesm3-2026.firebasestorage.app",
            messagingSenderId: "737602022332",
            appId: "1:737602022332:web:6ce248c9dee96e876819b9",
            measurementId: "G-Z41DMQ940H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let isHost = false;
        let players = {};
        let gameState = { phase: 'Waiting', leaderIdx: 0, missionNum: 1, votes: {}, missionVotes: {}, history: [] };

        function joinGame() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("Identify yourself!");
            db.ref('players/' + myName).set({ name: myName, role: "Pending", isLeader: false, inMission: false });
            showGame();
        }

        function beHost() { isHost = true; document.getElementById('host-panel').classList.remove('hidden'); showGame(); }

        function showGame() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            db.ref('/').on('value', (snap) => {
                const data = snap.val() || {};
                players = data.players || {};
                gameState = data.gameState || { phase: 'Waiting', missionNum: 1, history: [] };
                updateUI();
            });
        }

        function updateUI() {
            const playerKeys = Object.keys(players);
            const teamSize = playerKeys.filter(k => players[k].inMission).length;
            
            document.getElementById('game-status').innerText = `PHASE: ${gameState.phase} | MISSION: ${gameState.missionNum}`;
            
            // Update Scoreboard
            if(gameState.history) {
                gameState.history.forEach((res, i) => {
                    const el = document.getElementById(`m${i+1}`);
                    el.innerText = res === 'SUCCESS' ? '✓' : '✗';
                    el.className = `score-box ${res === 'SUCCESS' ? 'score-good' : 'score-evil'}`;
                });
            }

            // Render Player Grid
            const grid = document.getElementById('player-grid');
            grid.innerHTML = "";
            playerKeys.forEach(id => {
                const p = players[id];
                if(p.name === myName) document.getElementById('role-text').innerText = p.role;
                grid.innerHTML += `
                    <div class="p-2 border ${p.inMission ? 'border-blue-400 bg-blue-900/40' : 'border-zinc-800'} rounded relative">
                        ${p.isLeader ? '<span class="absolute -top-2 -left-1 text-lg">👑</span>' : ''}
                        <div class="text-[10px] ${p.name === myName ? 'text-green-400 font-bold' : 'text-zinc-400'}">${p.name}</div>
                        ${p.inMission ? '<div class="text-[8px] text-blue-400 mt-1">AGENT</div>' : ''}
                    </div>`;
            });

            // Action UI Logic
            const actionUI = document.getElementById('action-ui');
            const me = players[myName] || {};
            actionUI.innerHTML = "";

            if(gameState.phase === 'Selecting') {
                document.getElementById('progress-stats').innerText = `Leader is choosing 4 agents... (${teamSize}/4)`;
                if(me.isLeader) {
                    actionUI.innerHTML = `<p class="text-blue-400 text-xs mb-2">เลือกทีมไปทำภารกิจ (ต้องครบ 4 คน)</p>`;
                    let btns = `<div class="grid grid-cols-3 gap-2">`;
                    playerKeys.forEach(id => {
                        btns += `<button onclick="toggleMember('${id}')" ${teamSize >= 4 && !players[id].inMission ? 'disabled' : ''} class="text-[10px] py-2 border ${players[id].inMission ? 'bg-blue-600 border-white' : 'border-zinc-700'}">${players[id].name}</button>`;
                    });
                    btns += `</div><button onclick="startVote()" class="w-full btn-neon py-3 mt-4 font-bold" ${teamSize !== 4 ? 'disabled' : ''}>PROPOSE TEAM (4 AGENTS)</button>`;
                    actionUI.innerHTML += btns;
                } else {
                    actionUI.innerHTML = `<p class="animate-pulse text-yellow-500">หัวหน้ากำลังเลือกทีม (4 คน)...</p>`;
                }
            }

            else if(gameState.phase === 'VotingTeam') {
                const currentVotes = gameState.votes ? Object.keys(gameState.votes).length : 0;
                document.getElementById('progress-stats').innerText = `Team Approval: ${currentVotes}/${playerKeys.length} Voted`;
                if(gameState.votes && gameState.votes[myName] !== undefined) {
                    actionUI.innerHTML = `<p class="text-zinc-500 italic">หย่อนบัตรลงคะแนนแล้ว... รอคนอื่น</p>`;
                } else {
                    actionUI.innerHTML = `
                        <h4 class="text-sm mb-4">อนุมัติทีม 4 คนนี้หรือไม่?</h4>
                        <div class="flex gap-4">
                            <button onclick="castVote(true)" class="flex-1 bg-green-700 py-4 rounded font-bold">APPROVE</button>
                            <button onclick="castVote(false)" class="flex-1 bg-red-800 py-4 rounded font-bold">REJECT</button>
                        </div>`;
                }
                if(isHost && currentVotes >= playerKeys.length) processTeamVote();
            }

            else if(gameState.phase === 'OnMission') {
                const mVotes = gameState.missionVotes ? Object.keys(gameState.missionVotes).length : 0;
                document.getElementById('progress-stats').innerText = `Mission Progress: ${mVotes}/4 Agents Voted`;
                if(me.inMission) {
                    if(gameState.missionVotes && gameState.missionVotes[myName] !== undefined) {
                        actionUI.innerHTML = `<p class="text-blue-500 animate-pulse">ส่งผลการโหวตลับแล้ว...</p>`;
                    } else {
                        actionUI.innerHTML = `
                            <h4 class="text-sm mb-4 text-blue-300">EXECUTE MISSION (SECRET VOTE)</h4>
                            <div class="flex gap-4">
                                <button onclick="castMissionVote(true)" class="flex-1 bg-blue-600 py-6 rounded font-bold">SUCCESS</button>
                                <button onclick="castMissionVote(false)" class="flex-1 border border-red-500 text-red-500 py-6 rounded font-bold">FAIL</button>
                            </div>`;
                    }
                } else {
                    actionUI.innerHTML = `<p class="text-zinc-500 italic">สายลับ 4 คนกำลังปฏิบัติภารกิจลับ... โปรดรอฟังผล</p>`;
                }
                if(isHost && mVotes >= 4) processMissionResult();
            }

            if(isHost) {
                const adminGrid = document.getElementById('admin-spy-grid');
                adminGrid.innerHTML = "";
                playerKeys.forEach(id => adminGrid.innerHTML += `<div class="text-[9px] p-1 bg-zinc-900 border border-zinc-800">${players[id].name}: ${players[id].role}</div>`);
                document.getElementById('start-btn').disabled = playerKeys.length < 10;
            }
        }

        // --- CORE LOGIC ---
        function toggleMember(id) { db.ref(`players/${id}/inMission`).set(!players[id].inMission); }
        function startVote() { db.ref('gameState').update({ phase: 'VotingTeam', votes: {} }); }
        function castVote(val) { db.ref(`gameState/votes/${myName}`).set(val); }
        function castMissionVote(val) { db.ref(`gameState/missionVotes/${myName}`).set(val); }

        function processTeamVote() {
            const votes = Object.values(gameState.votes);
            const approves = votes.filter(v => v === true).length;
            if(approves > (votes.length / 2)) {
                alert(`โหวตผ่าน! (Approve: ${approves}, Reject: ${votes.length - approves}) เริ่มทำภารกิจ...`);
                db.ref('gameState').update({ phase: 'OnMission', missionVotes: {} });
            } else {
                alert(`โหวตไม่ผ่าน! เปลี่ยนหัวหน้าทีม`);
                passLeader();
            }
        }

        function processMissionResult() {
            const votes = Object.values(gameState.missionVotes);
            const successCount = votes.filter(v => v === true).length;
            const failCount = votes.filter(v => v === false).length;
            
            let finalRes = 'SUCCESS';
            if(failCount > 0) finalRes = 'FAIL'; // กฎ: ล้มเหลว 1 คน = ล้มเหลวทันที

            alert(`ผลภารกิจ: ${finalRes}\n(สำเร็จ: ${successCount} คน | ล้มเหลว: ${failCount} คน)`);
            
            let newHistory = gameState.history || [];
            newHistory.push(finalRes);
            
            db.ref('gameState').update({ 
                history: newHistory,
                missionNum: gameState.missionNum + 1,
                missionVotes: null
            });
            passLeader();
        }

        function passLeader() {
            const keys = Object.keys(players);
            const nextIdx = (gameState.leaderIdx + 1) % keys.length;
            const updates = {};
            keys.forEach((id, idx) => {
                updates[`players/${id}/isLeader`] = (idx === nextIdx);
                updates[`players/${id}/inMission`] = false;
            });
            updates['gameState/leaderIdx'] = nextIdx;
            updates['gameState/phase'] = 'Selecting';
            updates['gameState/votes'] = null;
            db.ref().update(updates);
        }

        function distributeRoles() {
            const keys = Object.keys(players);
            const count = keys.length;
            let evilCount = Math.floor(count * 0.4);
            let pool = ['MERLIN (Good)', 'ASSASSIN (Evil)'];
            for(let i=0; i < (count - evilCount - 1); i++) pool.push('Servant (Good)');
            for(let i=0; i < (evilCount - 1); i++) pool.push('Minion (Evil)');
            pool = pool.sort(() => Math.random() - 0.5);
            const updates = {};
            keys.forEach((id, idx) => {
                updates[`players/${id}/role`] = pool[idx];
                updates[`players/${id}/isLeader`] = (idx === 0);
                updates[`players/${id}/inMission`] = false;
            });
            updates['gameState'] = { phase: 'Selecting', leaderIdx: 0, missionNum: 1, history: [], votes: null };
            db.ref().update(updates);
        }

        function resetGame() { if(confirm("RESET SYSTEM?")) db.ref('/').set({ timer: 0 }); location.reload(); }
    </script>
</body>
</html>
