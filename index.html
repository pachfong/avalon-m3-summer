<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-AVALON: MISSION 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #050505; color: #00ff41; overflow-x: hidden; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .cyber-border { border: 2px solid #00ff41; box-shadow: 0 0 10px #00ff41; }
        .btn-neon { background: transparent; border: 1px solid #00ff41; color: #00ff41; transition: 0.3s; cursor: pointer; }
        .btn-neon:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        .host-panel { border-left: 4px solid #fbbf24; background: rgba(251, 191, 36, 0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="cyber-font text-3xl md:text-5xl font-bold text-neon tracking-widest">AI-AVALON</h1>
            <div id="timer-display" class="text-4xl font-bold text-yellow-400 mt-4 cyber-font">00:00</div>
        </div>

        <div id="login-screen" class="cyber-border p-6 rounded-lg bg-black">
            <h2 class="cyber-font text-xl mb-4 text-center">IDENTIFY AGENT</h2>
            <input type="text" id="username" placeholder="กรอกชื่อของคุณ..." class="w-full bg-zinc-900 border border-zinc-700 p-4 mb-4 text-green-500 focus:outline-none focus:border-green-400">
            <button onclick="joinGame()" class="w-full btn-neon py-4 cyber-font font-bold">CONNECT TO SYSTEM</button>
            <div class="mt-6 text-center">
                <button onclick="beHost()" class="text-zinc-600 text-xs hover:text-yellow-500 transition underline">ADMIN LOGIN (HOST ONLY)</button>
            </div>
        </div>

        <div id="waiting-room" class="hidden cyber-border p-6 rounded-lg bg-black">
            <h2 class="cyber-font text-xl mb-4">ONLINE AGENTS: <span id="count" class="text-white">0</span>/20</h2>
            <div id="player-list" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-8 text-sm italic text-zinc-500"></div>
            
            <div id="host-controls" class="hidden host-panel p-4 rounded">
                <p class="text-yellow-500 text-xs mb-3 font-bold">HOST COMMAND CENTER</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <button onclick="initRoles()" class="btn-neon py-2 text-sm border-yellow-500 text-yellow-500">RANDOM ROLES & START</button>
                    <button onclick="startTimer(60)" class="btn-neon py-2 text-sm border-blue-500 text-blue-500">SET TIMER 60s</button>
                    <button onclick="resetGame()" class="btn-neon py-2 text-sm border-red-500 text-red-500 col-span-full">RESET SYSTEM</button>
                </div>
            </div>
        </div>

        <div id="role-display" class="hidden text-center p-12 cyber-border bg-zinc-900 rounded-lg">
            <p class="text-zinc-400 uppercase tracking-widest text-xs mb-2">Your Secret Identity</p>
            <h2 id="my-role" class="text-4xl font-bold text-white mb-6 shadow-sm">Analyzing...</h2>
            <div id="role-desc" class="text-sm text-zinc-400 max-w-xs mx-auto"></div>
        </div>

        <div id="host-dashboard" class="hidden mt-8 p-4 border-t border-zinc-800">
            <h3 class="cyber-font text-yellow-500 mb-4 text-sm">REAL-TIME MONITORING</h3>
            <div id="admin-table" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDbQMmh1szC4ANGJZihJazUzvtVjYHE44c",
            authDomain: "activitiesm3-2026.firebaseapp.com",
            databaseURL: "https://activitiesm3-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "activitiesm3-2026",
            storageBucket: "activitiesm3-2026.firebasestorage.app",
            messagingSenderId: "737602022332",
            appId: "1:737602022332:web:6ce248c9dee96e876819b9",
            measurementId: "G-Z41DMQ940H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let isHost = false;

        // --- FUNCTIONS ---
        function joinGame() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("กรุณาระบุชื่อรหัส!");
            
            db.ref('players/' + myName).set({ name: myName, role: "Pending..." });
            showScreen('waiting-room');
            listenToData();
        }

        function beHost() {
            isHost = true;
            document.getElementById('host-controls').classList.remove('hidden');
            showScreen('waiting-room');
            listenToData();
        }

        function listenToData() {
            // ฟังข้อมูลผู้เล่น
            db.ref('players').on('value', (snap) => {
                const data = snap.val() || {};
                const list = document.getElementById('player-list');
                const adminTable = document.getElementById('admin-table');
                
                list.innerHTML = "";
                adminTable.innerHTML = "";
                let count = 0;

                for(let id in data) {
                    count++;
                    list.innerHTML += `<div class="p-2 border border-zinc-800 rounded text-center">[ ${data[id].name} ]</div>`;
                    
                    if(isHost) {
                        adminTable.innerHTML += `
                            <div class="flex justify-between p-2 bg-zinc-900 text-xs border-l-2 border-yellow-500">
                                <span>${data[id].name}</span>
                                <span class="text-white">${data[id].role}</span>
                            </div>`;
                    }

                    if(data[id].name === myName && data[id].role !== "Pending...") {
                        displayMyRole(data[id].role);
                    }
                }
                document.getElementById('count').innerText = count;
            });

            // ฟังนาฬิกา
            db.ref('timer').on('value', (snap) => {
                let sec = snap.val() || 0;
                let m = Math.floor(sec / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
                if(sec > 0 && sec <= 10) document.getElementById('timer-display').classList.add('text-red-500');
                else document.getElementById('timer-display').classList.remove('text-red-500');
            });
        }

        function initRoles() {
            db.ref('players').once('value', (snap) => {
                let players = Object.keys(snap.val());
                let pool = [
                    'MERLIN (Good)', 'ASSASSIN (Evil)',
                    ...Array(12).fill('Servant (Good)'),
                    ...Array(6).fill('Minion (Evil)')
                ].sort(() => Math.random() - 0.5);

                players.forEach((id, i) => {
                    db.ref('players/' + id).update({ role: pool[i] || 'Citizen' });
                });
            });
        }

        function displayMyRole(role) {
            showScreen('role-display');
            const roleEl = document.getElementById('my-role');
            roleEl.innerText = role;
            roleEl.className = role.includes('Good') ? 'text-4xl font-bold text-blue-400 mb-6' : 'text-4xl font-bold text-red-500 mb-6';
            
            document.getElementById('role-desc').innerText = 
                role.includes('MERLIN') ? "คุณรู้ว่าใครคือฝ่ายร้าย แต่ห้ามให้ใครรู้ตัวจริงของคุณ!" :
                role.includes('Good') ? "ร่วมมือกับเพื่อนทำภารกิจให้สำเร็จ และหาตัว Merlin ให้เจอเพื่อปกป้องเขา" :
                "ทำลายภารกิจอย่างแนบเนียน และปั่นหัวฝ่ายดีให้ทายผิด";
        }

        function startTimer(s) {
            let time = s;
            const interval = setInterval(() => {
                db.ref('timer').set(time);
                if(time <= 0) clearInterval(interval);
                time--;
            }, 1000);
        }

        function resetGame() {
            if(confirm("ยืนยันการรีเซ็ตระบบทั้งหมด?")) {
                db.ref('/').set({ timer: 0 });
                location.reload();
            }
        }

        function showScreen(id) {
            ['login-screen', 'waiting-room', 'role-display'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if(isHost && id !== 'login-screen') document.getElementById('host-dashboard').classList.remove('hidden');
        }
    </script>
</body>
</html>
