<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVALON: FINAL PROTOCOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #050505; color: #00ff41; overflow-x: hidden; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .cyber-border { border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        .btn-neon { border: 1px solid #00ff41; color: #00ff41; transition: 0.3s; cursor: pointer; background: rgba(0,0,0,0.6); }
        .btn-neon:hover:not(:disabled) { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        .btn-neon:disabled { border-color: #333; color: #333; cursor: not-allowed; opacity: 0.2; }
        .score-box { width: 40px; height: 40px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; }
        .score-good { background: #1e40af; border-color: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59,130,246,0.5); }
        .score-evil { background: #7f1d1d; border-color: #ef4444; color: white; box-shadow: 0 0 15px rgba(239,68,68,0.5); }
        .mission-card { width: 70px; height: 100px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: #111; border: 2px solid #333; animation: flip 0.6s ease-in-out; }
        @keyframes flip { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
        .card-success { border-color: #3b82f6; color: #3b82f6; }
        .card-fail { border-color: #ef4444; color: #ef4444; }
        .admin-badge { background: #facc15; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 cyber-border p-4 bg-black rounded-lg gap-4">
            <div class="text-center md:text-left">
                <h1 class="cyber-font text-2xl font-bold text-white tracking-tighter">AVALON <span class="text-green-500">FINAL</span></h1>
                <p id="game-status" class="text-[10px] text-yellow-500 uppercase tracking-widest">Neural Link Established</p>
            </div>
            <div class="flex gap-3" id="scoreboard">
                <div class="score-box" id="m1">1</div>
                <div class="score-box" id="m2">2</div>
                <div class="score-box" id="m3">3</div>
                <div class="score-box" id="m4">4</div>
                <div class="score-box" id="m5">5</div>
            </div>
        </div>

        <div id="login-screen" class="cyber-border p-10 rounded-xl bg-zinc-900/50 text-center backdrop-blur-sm">
            <h2 class="cyber-font text-green-500 mb-6 tracking-widest">AGENT IDENTIFICATION</h2>
            <input type="text" id="username" placeholder="ENTER AGENT NAME" class="w-full bg-black border-2 border-zinc-800 p-5 mb-6 text-green-400 text-center text-xl focus:border-green-500 outline-none transition-all">
            <button onclick="joinGame()" class="w-full btn-neon py-5 cyber-font font-bold text-lg rounded-lg">INITIALIZE LINK</button>
            <button onclick="beHost()" class="text-zinc-600 text-[10px] mt-8 block mx-auto underline hover:text-zinc-400 transition-colors">COMMANDER ACCESS (ADMIN)</button>
        </div>

        <div id="game-board" class="hidden animate-in fade-in duration-700">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                <div class="p-4 bg-zinc-900 border-l-4 border-blue-500 rounded-lg">
                    <span class="text-[10px] text-zinc-500 block uppercase font-bold">Encrypted Identity</span>
                    <span id="role-text" class="font-bold text-lg uppercase text-white tracking-wide">WAITING...</span>
                </div>
                <div class="p-4 bg-zinc-900 border-l-4 border-yellow-500 rounded-lg flex justify-between items-center">
                    <div>
                        <span class="text-[10px] text-zinc-500 block uppercase font-bold">Mission Progress</span>
                        <span id="progress-stats" class="text-sm font-medium text-yellow-500">Synchronizing...</span>
                    </div>
                </div>
            </div>

            <div id="player-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 mb-8"></div>

            <div id="action-center" class="cyber-border p-8 bg-black/80 rounded-2xl min-h-[300px] flex flex-col justify-center relative overflow-hidden">
                <div id="action-ui" class="space-y-6 text-center z-10"></div>
                <div class="absolute inset-0 opacity-5 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
            </div>

            <div id="host-panel" class="hidden mt-8 p-6 border border-yellow-600/20 bg-yellow-950/5 rounded-xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-yellow-500 text-xs cyber-font underline">COMMANDER INTEL</h3>
                    <div id="admin-notif" class="flex gap-2"></div>
                </div>
                <div id="admin-spy-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6"></div>
                <div class="flex gap-3">
                    <button onclick="distributeRoles()" id="start-btn" class="flex-1 btn-neon text-xs py-3 rounded-md uppercase font-bold" disabled>Launch Mission</button>
                    <button onclick="resetGame()" class="px-6 btn-neon text-xs border-red-900 text-red-500 rounded-md">RESET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbQMmh1szC4ANGJZihJazUzvtVjYHE44c",
            authDomain: "activitiesm3-2026.firebaseapp.com",
            databaseURL: "https://activitiesm3-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "activitiesm3-2026",
            storageBucket: "activitiesm3-2026.firebasestorage.app",
            messagingSenderId: "737602022332",
            appId: "1:737602022332:web:6ce248c9dee96e876819b9",
            measurementId: "G-Z41DMQ940H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let isHost = false;
        let players = {};
        let gameState = { phase: 'Waiting', history: [], votes: {}, missionVotes: {} };

        function joinGame() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("Agent Name Required!");
            db.ref('players/' + myName).set({ name: myName, role: "Pending", isLeader: false, inMission: false });
            showGame();
        }

        function beHost() { isHost = true; document.getElementById('host-panel').classList.remove('hidden'); showGame(); }

        function showGame() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            db.ref('/').on('value', (snap) => {
                const data = snap.val() || {};
                players = data.players || {};
                gameState = data.gameState || { phase: 'Waiting', history: [] };
                updateUI();
            });
        }

        function updateUI() {
            const keys = Object.keys(players);
            const teamSize = keys.filter(k => players[k].inMission).length;
            const ui = document.getElementById('action-ui');
            const me = players[myName] || {};
            ui.innerHTML = "";

            // Scoreboard sync
            if(gameState.history) {
                gameState.history.forEach((res, i) => {
                    const el = document.getElementById(`m${i+1}`);
                    el.className = `score-box ${res === 'SUCCESS' ? 'score-good' : 'score-evil'}`;
                    el.innerText = res === 'SUCCESS' ? '✓' : '✗';
                });
            }

            // Player Cards
            const grid = document.getElementById('player-grid');
            grid.innerHTML = "";
            keys.forEach(id => {
                const p = players[id];
                if(p.name === myName) document.getElementById('role-text').innerText = p.role;
                grid.innerHTML += `
                    <div class="p-3 border-2 ${p.inMission ? 'border-blue-500 bg-blue-900/20' : 'border-zinc-800 bg-zinc-900/30'} rounded-lg transition-all">
                        <div class="text-[12px] ${p.name === myName ? 'text-green-400 font-bold' : 'text-zinc-400'}">
                            ${p.isLeader ? '👑 ' : ''}${p.name}
                        </div>
                    </div>`;
            });

            // PHASE LOGIC
            if(gameState.phase === 'Selecting') {
                document.getElementById('progress-stats').innerText = `Leader Choosing Agents (${teamSize}/4)`;
                if(me.isLeader) {
                    ui.innerHTML = `<h3 class="text-blue-400 cyber-font text-lg mb-6">MISSION TEAM SELECTION</h3><div class="flex flex-col gap-3">`;
                    keys.forEach(id => {
                        ui.innerHTML += `<button onclick="toggleMember('${id}')" ${teamSize >= 4 && !players[id].inMission ? 'disabled' : ''} class="w-full py-4 text-md border-2 rounded-xl transition-all font-bold ${players[id].inMission ? 'bg-blue-600 border-white text-white' : 'border-zinc-800 text-zinc-500'}">${players[id].name}</button>`;
                    });
                    ui.innerHTML += `</div><button onclick="startVote()" class="w-full btn-neon py-5 mt-8 font-bold text-xl rounded-2xl" ${teamSize !== 4 ? 'disabled' : ''}>PROPOSE TEAM OF 4</button>`;
                } else ui.innerHTML = `<div class="p-10"><div class="animate-spin h-10 w-10 border-4 border-green-500 border-t-transparent rounded-full mx-auto mb-4"></div><p class="text-yellow-500 animate-pulse cyber-font">LEADER IS ASSEMBLING TEAM...</p></div>`;
            }

            else if(gameState.phase === 'VotingTeam') {
                const vCount = gameState.votes ? Object.keys(gameState.votes).length : 0;
                document.getElementById('progress-stats').innerText = `Votes Collected: ${vCount}/${keys.length}`;
                if(gameState.votes && gameState.votes[myName] !== undefined) ui.innerHTML = `<p class="text-zinc-500 italic text-lg cyber-font">VOTE CASTED. AWAITING OTHERS...</p>`;
                else ui.innerHTML = `<h3 class="text-xl mb-8">APPROVE THIS 4-MAN SQUAD?</h3><div class="flex flex-col gap-4"><button onclick="castVote(true)" class="w-full bg-green-600 py-6 rounded-2xl font-bold text-2xl shadow-lg">APPROVE</button><button onclick="castVote(false)" class="w-full border-2 border-red-600 text-red-600 py-6 rounded-2xl font-bold text-2xl">REJECT</button></div>`;
                if(isHost) document.getElementById('admin-notif').innerHTML = `<span class="admin-badge">VOTES: ${vCount}/${keys.length}</span>`;
                if(isHost && vCount >= keys.length) processTeamVote();
            }

            else if(gameState.phase === 'OnMission') {
                const mVotes = gameState.missionVotes ? Object.keys(gameState.missionVotes).length : 0;
                document.getElementById('progress-stats').innerText = `Active Mission: ${mVotes}/4 Actions Sent`;
                if(me.inMission) {
                    if(gameState.missionVotes && gameState.missionVotes[myName] !== undefined) ui.innerHTML = `<p class="text-blue-500 animate-pulse text-lg cyber-font">ACTION ENCRYPTED & SENT</p>`;
                    else {
                        const isEvil = me.role.includes('Evil');
                        ui.innerHTML = `<h3 class="text-xl mb-8 text-blue-400 cyber-font">MISSION EXECUTION</h3><div class="flex flex-col gap-4">
                            <button onclick="castMissionVote(true)" class="w-full bg-blue-600 py-8 rounded-2xl font-bold text-2xl">SUCCESS</button>
                            ${isEvil ? '<button onclick="castMissionVote(false)" class="w-full border-2 border-red-500 text-red-500 py-8 rounded-2xl font-bold text-2xl">SABOTAGE (FAIL)</button>' : ''}
                        </div>`;
                    }
                } else ui.innerHTML = `<p class="text-zinc-600 italic animate-pulse text-lg">MISSION IN PROGRESS... STAND BY.</p>`;
                if(isHost) document.getElementById('admin-notif').innerHTML = `<span class="admin-badge bg-blue-500 text-white">MISSION: ${mVotes}/4</span>`;
                if(isHost && mVotes >= 4) processMissionResult();
            }

            else if(gameState.phase === 'Revealing') {
                const cards = gameState.lastCards || [];
                ui.innerHTML = `<h3 class="text-xl mb-8 text-yellow-500 cyber-font">MISSION DISCLOSURE</h3><div class="flex justify-center gap-4 mb-8">`;
                cards.forEach(c => ui.innerHTML += `<div class="mission-card ${c ? 'card-success' : 'card-fail'}">${c ? '✓' : '✗'}</div>`);
                ui.innerHTML += `</div><p class="text-lg font-bold ${gameState.lastOutcome === 'SUCCESS' ? 'text-blue-400' : 'text-red-500'}">OUTCOME: ${gameState.lastOutcome}</p>`;
                if(isHost) ui.innerHTML += `<button onclick="nextRound()" class="w-full btn-neon py-5 mt-8 font-bold text-xl rounded-2xl">INITIATE NEXT ROUND</button>`;
            }

            if(isHost) {
                const spy = document.getElementById('admin-spy-grid');
                spy.innerHTML = "";
                keys.forEach(id => spy.innerHTML += `<div class="text-[9px] p-2 bg-zinc-900 border border-zinc-800 rounded text-zinc-500">${players[id].name}: <span class="text-white">${players[id].role}</span></div>`);
                document.getElementById('start-btn').disabled = keys.length < 10;
            }
        }

        // --- HANDLERS ---
        function toggleMember(id) { db.ref(`players/${id}/inMission`).set(!players[id].inMission); }
        function startVote() { db.ref('gameState').update({ phase: 'VotingTeam', votes: {} }); }
        function castVote(val) { db.ref(`gameState/votes/${myName}`).set(val); }
        function castMissionVote(val) { db.ref(`gameState/missionVotes/${myName}`).set(val); }

        function processTeamVote() {
            const v = Object.values(gameState.votes);
            const ok = v.filter(x => x === true).length;
            if(ok > (v.length/2)) db.ref('gameState').update({ phase: 'OnMission', missionVotes: {} });
            else { alert("TEAM REJECTED!"); passLeader(); }
        }

        function processMissionResult() {
            const v = Object.values(gameState.missionVotes);
            const shuffled = [...v].sort(() => Math.random() - 0.5);
            const failed = v.filter(x => x === false).length;
            const res = failed > 0 ? 'FAIL' : 'SUCCESS';
            let hist = gameState.history || [];
            hist.push(res);
            db.ref('gameState').update({ phase: 'Revealing', lastCards: shuffled, lastOutcome: res, history: hist, missionVotes: null });
        }

        function nextRound() {
            db.ref('gameState').update({ missionNum: (gameState.missionNum || 1) + 1 });
            passLeader();
        }

        function passLeader() {
            const keys = Object.keys(players);
            const nextIdx = (gameState.leaderIdx + 1) % keys.length;
            const up = {};
            keys.forEach((id, idx) => { up[`players/${id}/isLeader`] = (idx === nextIdx); up[`players/${id}/inMission`] = false; });
            up['gameState/leaderIdx'] = nextIdx;
            up['gameState/phase'] = 'Selecting';
            up['gameState/votes'] = null;
            db.ref().update(up);
        }

        function distributeRoles() {
            const keys = Object.keys(players);
            let evilNum = Math.floor(keys.length * 0.4);
            let pool = ['MERLIN (Good)', 'ASSASSIN (Evil)'];
            for(let i=0; i < (keys.length - evilNum - 1); i++) pool.push('Servant (Good)');
            for(let i=0; i < (evilNum - 1); i++) pool.push('Minion (Evil)');
            pool = pool.sort(() => Math.random() - 0.5);
            const up = {};
            keys.forEach((id, idx) => { up[`players/${id}/role`] = pool[idx]; up[`players/${id}/isLeader`] = (idx === 0); up[`players/${id}/inMission`] = false; });
            up['gameState'] = { phase: 'Selecting', leaderIdx: 0, missionNum: 1, history: [], votes: null };
            db.ref().update(up);
        }

        function resetGame() { if(confirm("REBOOT SYSTEM?")) db.ref('/').set({ timer: 0 }); location.reload(); }
    </script>
</body>
</html>
