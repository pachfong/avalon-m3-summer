<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-AVALON: ULTIMATE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #050505; color: #00ff41; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .cyber-border { border: 1px solid #00ff41; box-shadow: 0 0 10px #00ff41; }
        .btn-neon { border: 1px solid #00ff41; color: #00ff41; transition: 0.3s; cursor: pointer; }
        .btn-neon:hover:not(:disabled) { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        .btn-neon:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        .leader-crown { color: #fbbf24; text-shadow: 0 0 5px #fbbf24; }
        .mission-tag { color: #38bdf8; font-size: 0.7rem; }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 cyber-border p-4 bg-black rounded">
            <div>
                <h1 class="cyber-font text-xl font-bold">SYSTEM: AVALON</h1>
                <p id="game-status" class="text-xs text-zinc-500">WAITING FOR AGENTS...</p>
            </div>
            <div id="timer-display" class="cyber-font text-2xl text-yellow-400">00:00</div>
        </div>

        <div id="login-screen" class="cyber-border p-8 rounded bg-zinc-900">
            <input type="text" id="username" placeholder="รหัสประจำตัวของคุณ..." class="w-full bg-black border border-zinc-700 p-4 mb-4 text-green-500 focus:outline-none">
            <button onclick="joinGame()" class="w-full btn-neon py-4 cyber-font">INITIALIZE</button>
            <button onclick="beHost()" class="w-full text-zinc-600 text-xs mt-4 underline">HOST DASHBOARD</button>
        </div>

        <div id="game-board" class="hidden">
            <div id="personal-role" class="mb-4 p-4 bg-zinc-900 border-l-4 border-blue-500">
                <span class="text-xs text-zinc-400">IDENTITY:</span>
                <span id="role-text" class="font-bold ml-2">ANALYZING...</span>
            </div>

            <div id="player-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>

            <div id="action-area" class="cyber-border p-6 bg-black rounded mb-6 min-h-[150px]">
                <h3 id="action-title" class="cyber-font text-sm mb-4 text-yellow-500 underline">SYSTEM MESSAGE</h3>
                <div id="action-content" class="flex flex-col gap-3">
                    </div>
            </div>

            <div id="host-panel" class="hidden p-4 border border-yellow-900 bg-yellow-950/10 rounded">
                <p class="text-yellow-500 text-[10px] mb-2 cyber-font">ADMIN OVERRIDE</p>
                <div class="flex gap-2">
                    <button onclick="distributeRoles()" id="start-btn" class="btn-neon text-[10px] px-3 py-1" disabled>START (MIN 10)</button>
                    <button onclick="resetGame()" class="btn-neon text-[10px] px-3 py-1 border-red-500 text-red-500">RESET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbQMmh1szC4ANGJZihJazUzvtVjYHE44c",
            authDomain: "activitiesm3-2026.firebaseapp.com",
            databaseURL: "https://activitiesm3-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "activitiesm3-2026",
            storageBucket: "activitiesm3-2026.firebasestorage.app",
            messagingSenderId: "737602022332",
            appId: "1:737602022332:web:6ce248c9dee96e876819b9",
            measurementId: "G-Z41DMQ940H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let isHost = false;
        let playersData = {};
        let gameState = {};

        function joinGame() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("กรุณาใส่ชื่อ!");
            db.ref('players/' + myName).set({ name: myName, role: "Pending", isLeader: false, inMission: false });
            showBoard();
        }

        function beHost() { isHost = true; document.getElementById('host-panel').classList.remove('hidden'); showBoard(); }

        function showBoard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            listenToGame();
        }

        function listenToGame() {
            db.ref('/').on('value', (snap) => {
                const data = snap.val();
                playersData = data.players || {};
                gameState = data.gameState || { phase: 'Waiting', leaderIdx: 0, missionNum: 1 };
                renderPlayers();
                renderActions();
                updateStatus();
            });
        }

        function renderPlayers() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = "";
            let i = 0;
            for(let id in playersData) {
                const p = playersData[id];
                const isMyCard = p.name === myName;
                if(isMyCard) document.getElementById('role-text').innerText = p.role;

                grid.innerHTML += `
                    <div class="p-3 bg-zinc-900 border ${p.inMission ? 'border-blue-500' : 'border-zinc-800'} rounded relative">
                        ${p.isLeader ? '<span class="leader-crown absolute -top-2 -left-1">👑</span>' : ''}
                        <div class="text-xs ${isMyCard ? 'text-green-400 font-bold' : 'text-white'}">${p.name}</div>
                        ${p.inMission ? '<div class="mission-tag">🚀 ON MISSION</div>' : ''}
                    </div>
                `;
                i++;
            }
            if(isHost) document.getElementById('start-btn').disabled = Object.keys(playersData).length < 10;
        }

        function renderActions() {
            const content = document.getElementById('action-content');
            const title = document.getElementById('action-title');
            const me = playersData[myName] || {};
            content.innerHTML = "";

            if(gameState.phase === 'Waiting') {
                title.innerText = "WAITING ROOM";
                content.innerHTML = `<p class="text-xs">รอสมาชิกให้ครบ (ขั้นต่ำ 10 คน) เพื่อเริ่มเกม</p>`;
            } 
            else if(gameState.phase === 'Selecting') {
                title.innerText = "MISSION TEAM SELECTION";
                if(me.isLeader) {
                    content.innerHTML = `<p class="text-xs mb-2 text-blue-400">คุณคือหัวหน้า! เลือกสมาชิกไปทำภารกิจ:</p>`;
                    for(let id in playersData) {
                        content.innerHTML += `<button onclick="toggleMission('${id}')" class="text-[10px] p-1 border border-zinc-700 mb-1 ${playersData[id].inMission ? 'bg-blue-900' : ''}">${playersData[id].name}</button>`;
                    }
                    content.innerHTML += `<button onclick="submitTeam()" class="btn-neon py-2 mt-2 font-bold">ยืนยันทีม</button>`;
                } else {
                    content.innerHTML = `<p class="text-xs animate-pulse">หัวหน้ากำลังเลือกทีม...</p>`;
                }
            }
            else if(gameState.phase === 'VotingTeam') {
                title.innerText = "APPROVE THIS TEAM?";
                content.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="voteTeam(true)" class="flex-1 bg-green-900 py-4 rounded font-bold">เห็นด้วย</button>
                        <button onclick="voteTeam(false)" class="flex-1 bg-red-900 py-4 rounded font-bold">ไม่เห็นด้วย</button>
                    </div>
                `;
            }
            else if(gameState.phase === 'OnMission') {
                title.innerText = "MISSION IN PROGRESS";
                if(me.inMission) {
                    content.innerHTML = `
                        <p class="text-xs mb-2 text-yellow-500">คุณได้รับเลือก! ตัดสินใจอนาคตของภารกิจ:</p>
                        <div class="flex gap-2">
                            <button onclick="voteMission(true)" class="flex-1 bg-blue-600 py-4 rounded font-bold">สำเร็จ (SUCCESS)</button>
                            <button onclick="voteMission(false)" class="flex-1 bg-black border border-red-500 text-red-500 py-4 rounded font-bold">ล้มเหลว (FAIL)</button>
                        </div>
                    `;
                } else {
                    content.innerHTML = `<p class="text-xs italic text-zinc-500 text-center">ภารกิจกำลังดำเนินอยู่... <br>โปรดรอผลลัพธ์อย่างตื่นเต้น</p>`;
                }
            }
        }

        // --- GAME LOGIC FUNCTIONS ---

        function distributeRoles() {
            const keys = Object.keys(playersData);
            const count = keys.length;
            let evilCount = Math.floor(count * 0.4);
            let pool = ['MERLIN (Good)', 'ASSASSIN (Evil)'];
            for(let i=0; i < (count - evilCount - 1); i++) pool.push('Servant (Good)');
            for(let i=0; i < (evilCount - 1); i++) pool.push('Minion (Evil)');
            pool = pool.sort(() => Math.random() - 0.5);

            const updates = {};
            keys.forEach((id, idx) => {
                updates[`players/${id}/role`] = pool[idx];
                updates[`players/${id}/isLeader`] = (idx === 0);
            });
            updates['gameState'] = { phase: 'Selecting', leaderIdx: 0, missionNum: 1, voteCount: 0 };
            db.ref().update(updates);
        }

        function toggleMission(id) {
            db.ref(`players/${id}/inMission`).set(!playersData[id].inMission);
        }

        function submitTeam() {
            db.ref('gameState/phase').set('VotingTeam');
        }

        function voteTeam(isApprove) {
            // ระบบโหวตแบบ Simple: ถ้าไม่ผ่านให้เวียนหัวหน้า
            if(!isApprove) {
                alert("โหวตไม่ผ่าน! เปลี่ยนหัวหน้าทีม");
                passLeader();
            } else {
                db.ref('gameState/phase').set('OnMission');
            }
        }

        function voteMission(isSuccess) {
            alert(isSuccess ? "คุณส่งข้อมูลสำเร็จ!" : "คุณแอบทำลายภารกิจ!");
            // Logic: เมื่อคนสุดท้ายโหวตเสร็จ ให้จบรอบ (ในที่นี้ใช้ Admin กดจบรอบเพื่อความง่ายของครู)
            db.ref('gameState/phase').set('RoundEnd');
        }

        function passLeader() {
            const keys = Object.keys(playersData);
            let nextIdx = (gameState.leaderIdx + 1) % keys.length;
            const updates = {};
            keys.forEach((id, idx) => {
                updates[`players/${id}/isLeader`] = (idx === nextIdx);
                updates[`players/${id}/inMission`] = false;
            });
            updates['gameState/leaderIdx'] = nextIdx;
            updates['gameState/phase'] = 'Selecting';
            db.ref().update(updates);
        }

        function resetGame() { if(confirm("ล้างข้อมูลทั้งหมด?")) db.ref('/').set({ timer: 0 }); location.reload(); }
        function updateStatus() { document.getElementById('game-status').innerText = `PHASE: ${gameState.phase} | MISSION: ${gameState.missionNum}`; }
    </script>
</body>
</html>
